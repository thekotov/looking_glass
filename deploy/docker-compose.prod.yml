name: looking-glass-prod

# Production-ish overlay. Differences from docker-compose.server.yml:
#   - frontend is built into the nginx image as static files (no Vite dev
#     server, no source-code bind mounts).
#   - nginx CSP is tightened (no unsafe-inline/unsafe-eval).
#   - api runs with ENV=prod, DEBUG=false.
#   - postgres/redis volumes are still local; swap to managed services in
#     real deployments.
#
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}
      POSTGRES_DB: ${POSTGRES_DB:-lookingglass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lg} -d ${POSTGRES_DB:-lookingglass}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENV: prod
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://lg:${POSTGRES_PASSWORD}@postgres:5432/lookingglass}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in deploy/.env}
      CORS_ORIGINS: ${CORS_ORIGINS:-["https://localhost"]}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in deploy/.env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=2).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: ..
      dockerfile: deploy/nginx/Dockerfile.prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx-certs:/etc/nginx/certs
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  nginx-certs:
