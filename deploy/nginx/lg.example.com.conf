# Host-side nginx server block — HTTP only, reverse-proxies lg.example.com
# into the docker stack.
#
# Place this file at /etc/nginx/sites-available/lg.example.com.conf (or
# /etc/nginx/conf.d/) and reload nginx.
#
# Assumes the docker `nginx` service is published on 127.0.0.1:8080 (HTTP).
# In deploy/docker-compose.server.yml change the nginx ports mapping to:
#     ports:
#       - "127.0.0.1:8080:80"
# and drop the 443 mapping if TLS is terminated here on the host.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream looking_glass {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    listen [::]:80;
    server_name lg.example.com;

    client_max_body_size 10m;
    proxy_http_version 1.1;

    # WebSocket endpoints (agent live streaming, UI live task watch).
    location /ws/ {
        proxy_pass http://looking_glass;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
    }

    # Everything else (UI, /api/, /metrics) goes to the container's nginx,
    # which handles internal routing to api/frontend.
    location / {
        proxy_pass http://looking_glass;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
