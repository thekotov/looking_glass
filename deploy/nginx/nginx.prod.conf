user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types application/javascript application/json application/xml
               text/css text/plain text/xml image/svg+xml;

    # Required for nginx → upstream WebSocket proxying
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Use the inbound X-Request-Id if a client/load-balancer set one, otherwise
    # generate a fresh per-request id. Surfaced in access logs and forwarded
    # to FastAPI for log correlation.
    map $http_x_request_id $request_id_final {
        default $http_x_request_id;
        ""      $request_id;
    }

    log_format main escape=json
        '{"time":"$time_iso8601","remote_addr":"$remote_addr","request":"$request",'
        '"status":$status,"bytes":$body_bytes_sent,"referer":"$http_referer",'
        '"ua":"$http_user_agent","rid":"$request_id_final","rt":$request_time}';
    access_log /var/log/nginx/access.log main;

    # Rate-limit zones.
    #   api    — generic /api/*: 30 rps per IP, burst 60, no delay.
    #   login  — /api/auth/login: 5 / min per IP to slow credential stuffing.
    #   public — /api/public/*: 10 req / 10 min handled in-app, this is a cheap
    #            edge guard so unauth traffic can't saturate the upstream.
    limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m  rate=5r/m;
    limit_req_zone $binary_remote_addr zone=public:10m rate=20r/s;
    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1h;

        client_max_body_size 10m;
        client_body_timeout 30s;
        client_header_timeout 30s;
        send_timeout 30s;
        # Cap concurrent open sockets per source IP (helps with slowloris/idle
        # WebSocket hoarding). Tune up if you expect many tabs per user.
        limit_conn conn 50;

        # Propagate (or generate) a request id; useful for grepping incidents
        # across nginx + uvicorn logs.
        add_header X-Request-Id $request_id_final always;

        # Tightened CSP for prod: no unsafe-inline/unsafe-eval (the built bundle
        # has no inline scripts). Tailwind generates a static stylesheet, so
        # style-src can drop unsafe-inline too. If a future feature requires
        # inline scripts, prefer per-response nonces over loosening the policy.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self' wss: ws:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # Auth — strictest limit (5 rpm). burst=3 nodelay so a UI can submit
        # a couple of retries before bouncing, but bots get 429 fast.
        location = /api/auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id_final;
        }

        # Public/unauth lookups.
        location /api/public/ {
            limit_req zone=public burst=40 nodelay;
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id_final;
        }

        # Generic API.
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id_final;
        }

        # Prometheus scrape endpoint. Restrict to internal networks in prod.
        location = /metrics {
            # allow 10.0.0.0/8;
            # allow 172.16.0.0/12;
            # allow 192.168.0.0/16;
            # deny  all;
            proxy_pass http://api:8000/metrics;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # WebSocket endpoints (agent live streaming, UI live task watch)
        location /ws/ {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 1h;
        }

        # Built SPA — static files served directly from /usr/share/nginx/html.
        root /usr/share/nginx/html;
        index index.html;

        # Long-cache hashed assets emitted by Vite under /assets/.
        location /assets/ {
            access_log off;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # Never cache index.html — it points at the current asset hashes.
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            expires off;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
